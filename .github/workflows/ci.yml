name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest tests/ -v

  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate INPUT_SCHEMA.json (JSON)
        run: |
          python -c "
          import json
          with open('.actor/INPUT_SCHEMA.json') as f:
              json.load(f)
          print('INPUT_SCHEMA.json is valid JSON')
          "
      - name: Validate actor.json
        run: |
          python -c "
          import json
          with open('.actor/actor.json') as f:
              d = json.load(f)
          assert d.get('actorSpecification') == 1
          assert 'name' in d and 'version' in d
          print('actor.json is valid')
          "
